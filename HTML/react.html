<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pagina react del progetto Syllabus.">
    <title>Syllabus</title>
    <link rel="stylesheet" href="../CSS/styles.css">
    <script src="../JS/config.js" defer></script>
    <script src="../JS/script.js" defer></script>
    <script src="../JS/components.js" defer></script>
    <script src="../JS/main.js" defer></script>
  </head>
  <body data-page="react">
    <div id="site-header"></div>

    <main id="main-content" class="main-content">
      <section class="hero">
        <div class="container">
          <div class="hero__panel">
            <p class="hero__eyebrow" data-page-tag>Syllabus</p>
            <h2 class="hero__title" data-page-title></h2>
            <p class="hero__subtitle" data-page-subtitle></p>
          </div>
        </div>
      </section>

      <section class="page-section">
        <div class="container">
          <article class="content-placeholder">
            <h3 class="placeholder-title" data-placeholder-title></h3>
            <p class="placeholder-text" data-placeholder-text></p>
          </article>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>
  </body>
</html>
